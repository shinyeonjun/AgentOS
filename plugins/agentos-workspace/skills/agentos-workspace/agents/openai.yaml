interface:
  display_name: "AgentOS Workspace"
  short_description: "Use copied AgentOS sessions for coding tasks"
  brand_color: "#2563EB"
  default_prompt: "Use $agentos-workspace for this task. Run AgentOS doctor first, prepare Docker/image dependencies if needed, create or reuse an AgentOS session before editing files, work only inside the session workspace, produce a review package, and do not sync until I approve."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "agentos"
      description: "AgentOS MCP server for doctor/prepare checks, copied workspace sessions, command execution, review packages, and approval-gated sync."
      transport: "stdio"

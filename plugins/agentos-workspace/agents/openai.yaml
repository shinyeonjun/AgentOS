interface:
  display_name: "AgentOS Workspace"
  short_description: "Call AgentOS MCP before coding edits"
  brand_color: "#2563EB"
  default_prompt: "Use $agentos-workspace for this task. Before any file edit, call AgentOS MCP doctor. If AgentOS MCP tools are not visible, offer to run $agentos-setup to register the local MCP server first. Use the normal approval policy by default: create or reuse sessions, run commands, test, and review without asking because the original workspace is not changed. Do not edit the original workspace directly. Work only inside workspace_path, produce and verify a review package, and wait for explicit human approval before approve_scope or sync_approved changes the original project."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "agentos"
      description: "AgentOS MCP server. Must be called before coding edits: doctor, optional prepare, copied session workspace, command execution, review package, and sync-only approval gate."
      transport: "stdio"

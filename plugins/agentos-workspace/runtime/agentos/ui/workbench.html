<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentOS Workbench</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --panel-2: #eef2f7;
        --text: #17202c;
        --muted: #657386;
        --line: #d8dee8;
        --accent: #2563eb;
        --ok: #15803d;
        --warn: #b45309;
        --bad: #b91c1c;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #10141a;
          --panel: #171c24;
          --panel-2: #222936;
          --text: #eef2f7;
          --muted: #9ba8b7;
          --line: #303948;
          --accent: #73a7ff;
          --ok: #4ade80;
          --warn: #fbbf24;
          --bad: #fb7185;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        letter-spacing: 0;
      }

      button {
        font: inherit;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .mark {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel-2);
        color: var(--accent);
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.15;
      }

      .subtitle {
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .pills {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .pill,
      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 3px 8px;
        border-radius: 6px;
        background: var(--panel-2);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .ok {
        color: var(--ok);
      }

      .warn {
        color: var(--warn);
      }

      .bad {
        color: var(--bad);
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(300px, 1.25fr) minmax(280px, 0.85fr);
        gap: 1px;
        min-height: 0;
        background: var(--line);
      }

      .pane {
        min-width: 0;
        overflow: auto;
        background: var(--bg);
      }

      .inner {
        padding: 16px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 14px;
      }

      .metric,
      .panel,
      .row {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel);
      }

      .metric {
        padding: 11px;
        min-height: 68px;
      }

      .metric strong {
        display: block;
        font-size: 22px;
        line-height: 1;
      }

      .metric span {
        display: block;
        margin-top: 7px;
        color: var(--muted);
        font-size: 12px;
      }

      .panel {
        padding: 12px;
        margin-bottom: 12px;
      }

      .title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 9px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .rows {
        display: grid;
        gap: 7px;
      }

      .row {
        padding: 9px 10px;
      }

      .row-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-width: 0;
      }

      .name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 760;
      }

      .meta {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      pre {
        margin: 7px 0 0;
        max-height: 112px;
        overflow: auto;
        padding: 9px;
        border-radius: 6px;
        background: var(--panel-2);
        font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
        white-space: pre-wrap;
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      .action {
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel);
        color: var(--text);
        text-align: left;
        padding: 8px 10px;
        cursor: pointer;
      }

      .action.primary {
        border-color: color-mix(in srgb, var(--accent) 58%, var(--line));
        color: var(--accent);
        font-weight: 760;
      }

      .action:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 7px;
        padding: 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      @media (max-width: 820px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .pills {
          justify-content: flex-start;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="mark">A</div>
          <div>
            <h1>AgentOS Workbench</h1>
            <div class="subtitle" id="subtitle">Workspace, review, approval</div>
          </div>
        </div>
        <div class="pills">
          <span class="pill" id="sessionPill">no session</span>
          <span class="pill" id="statePill">ready</span>
        </div>
      </header>

      <section class="grid" aria-label="AgentOS workbench">
        <section class="pane">
          <div class="inner">
            <div class="summary">
              <div class="metric"><strong id="sessionCount">0</strong><span>sessions</span></div>
              <div class="metric"><strong id="commandCount">0</strong><span>commands</span></div>
              <div class="metric"><strong id="changedCount">0</strong><span>changed</span></div>
              <div class="metric"><strong id="blockerCount">0</strong><span>blockers</span></div>
            </div>

            <div class="panel">
              <div class="title">Current Session <span id="sessionState" class="badge">unknown</span></div>
              <div id="sessionBox"></div>
            </div>

            <div class="panel">
              <div class="title">Latest Command <span id="commandState" class="badge">none</span></div>
              <div id="commandBox"></div>
            </div>
          </div>
        </section>

        <aside class="pane">
          <div class="inner">
            <div class="panel">
              <div class="title">Review <span id="reviewState" class="badge">not ready</span></div>
              <div id="reviewBox"></div>
            </div>

            <div class="panel">
              <div class="title">Approval Gate <span id="approvalState" class="badge">blocked</span></div>
              <div id="approvalBox"></div>
            </div>

            <div class="actions">
              <button class="action" id="verifyReview" type="button">Verify review</button>
              <button class="action" id="syncPreflight" type="button">Sync preflight</button>
              <button class="action primary" id="approveSync" type="button">Approve and sync</button>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script>
      const fallback = {
        title: "AgentOS Workbench",
        mode: "observe_and_approve",
        state_dir: "default",
        output_dir: "default",
        sessions: [],
        changed_files: [],
        tool_calls: [],
        blockers: [],
      };

      function toolData() {
        const item =
          (window.openai && window.openai.toolResult) ||
          window.__OPENAI_TOOL_RESULT__ ||
          window.__AGENTOS_WORKBENCH_DATA__ ||
          fallback;
        return item.structuredContent || item;
      }

      function esc(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
      }

      function statusClass(value) {
        const v = String(value || "").toLowerCase();
        if (["passed", "ready", "complete", "synced", "ok"].includes(v)) return "ok";
        if (["failed", "blocked", "error"].includes(v)) return "bad";
        if (["warning", "missing", "pending", "not_checked"].includes(v)) return "warn";
        return "";
      }

      function setBadge(id, value) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = value || "unknown";
        el.className = `badge ${statusClass(value)}`;
      }

      function row(name, meta = "", badge = "") {
        return `<div class="row"><div class="row-head"><div class="name">${esc(name)}</div>${badge ? `<span class="badge ${statusClass(badge)}">${esc(badge)}</span>` : ""}</div>${meta ? `<div class="meta">${esc(meta)}</div>` : ""}</div>`;
      }

      function empty(text) {
        return `<div class="empty">${esc(text)}</div>`;
      }

      function asSession(data) {
        if (data.session) return data.session;
        if (data.session_id || data.workspace_path || data.input_path) return data;
        const sessions = data.sessions || [];
        return sessions[0] || null;
      }

      function render() {
        const data = toolData();
        const session = asSession(data);
        const sessions = data.sessions || (session ? [session] : []);
        const commands = data.tool_calls || data.commands || (session && session.tool_calls) || [];
        const latestCommand = commands[commands.length - 1];
        const changed = data.changed_files || data.planned_paths || [];
        const blockers = data.blockers || [];
        const reviewPath = data.review_package_artifact || data.review_package_path;
        const validation = data.validation_status || data.review_verification_status || "not ready";
        const approval = data.approval_verification_status || (blockers.length ? "blocked" : "pending");

        setText("subtitle", data.project_dir || data.target_dir || data.input_path || "Workspace, review, approval");
        setText("sessionPill", session ? session.name || session.session_id : "no session");
        setText("statePill", data.mode || data.next_action || "ready");
        setText("sessionCount", sessions.length);
        setText("commandCount", commands.length);
        setText("changedCount", changed.length);
        setText("blockerCount", blockers.length);
        setBadge("sessionState", session && (session.state || session.validation_status || "ready"));
        setBadge("commandState", latestCommand && (latestCommand.status || latestCommand.exit_code || "done"));
        setBadge("reviewState", validation);
        setBadge("approvalState", approval);

        document.getElementById("sessionBox").innerHTML = session
          ? [
              row("original", session.input_path || session.original_path || data.project_dir || ""),
              row("workspace", session.workspace_path || ""),
            ].join("")
          : empty("No session data yet. It will appear after create_session or session_summary.");

        document.getElementById("commandBox").innerHTML = latestCommand
          ? [
              row(
                Array.isArray(latestCommand.command) ? latestCommand.command.join(" ") : latestCommand.command || "command",
                latestCommand.cwd || "",
                latestCommand.role || latestCommand.status || "",
              ),
              latestCommand.stdout_tail || latestCommand.stderr_tail
                ? `<pre>${esc(latestCommand.stdout_tail || latestCommand.stderr_tail)}</pre>`
                : "",
            ].join("")
          : empty("No command result yet.");

        const reviewRows = [];
        if (reviewPath) reviewRows.push(row("package", reviewPath, validation));
        if (changed.length) reviewRows.push(row("changed files", changed.join("\\n"), `${changed.length}`));
        if (data.next_action) reviewRows.push(row("next", data.next_action));
        document.getElementById("reviewBox").innerHTML = reviewRows.length
          ? reviewRows.join("")
          : empty("Review details appear after review_session or sync_preflight.");

        const approvalRows = [];
        if (blockers.length) approvalRows.push(row("blockers", blockers.join("\\n"), "blocked"));
        if (data.recommended_scope_id) approvalRows.push(row("scope", data.recommended_scope_id));
        if (data.safe_to_sync !== undefined) approvalRows.push(row("safe to sync", String(data.safe_to_sync), data.safe_to_sync ? "ready" : "blocked"));
        document.getElementById("approvalBox").innerHTML = approvalRows.length
          ? approvalRows.join("")
          : empty("Approval remains locked until sync_preflight returns a concrete scope.");

        const hasBridge = Boolean(window.openai && typeof window.openai.callTool === "function");
        for (const id of ["verifyReview", "syncPreflight", "approveSync"]) {
          document.getElementById(id).disabled = !hasBridge;
        }
      }

      render();
      window.addEventListener("message", render);
    </script>
  </body>
</html>
